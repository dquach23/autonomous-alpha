name: Daily Market Research

on:
  schedule:
    # After-market close: 5:00 PM ET weekdays = 21:00 UTC (single daily run)
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

jobs:
  research:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Run market research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/research.js

      - name: Commit and push results
        run: |
          git config --global user.name 'Autonomous Alpha Bot'
          git config --global user.email 'bot@autonomous-alpha.ai'
          git add public/picks.json
          git diff --staged --quiet || git commit -m "Update market research - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
