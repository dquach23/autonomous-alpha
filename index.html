<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- iOS PWA configuration -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Halo" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#faf8f3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0b10" media="(prefers-color-scheme: dark)" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS splash screens (apple-touch-startup-image) — matched by device pixel size -->
    <!-- iPhone 13/14/15 Pro -->
    <link rel="apple-touch-startup-image" href="/splash-1170x2532.png"
          media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone 13/14/15 Pro Max -->
    <link rel="apple-touch-startup-image" href="/splash-1284x2778.png"
          media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone 14/15 (non-Pro) -->
    <link rel="apple-touch-startup-image" href="/splash-1179x2556.png"
          media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone XR/11 -->
    <link rel="apple-touch-startup-image" href="/splash-828x1792.png"
          media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <!-- iPhone 8/SE2 -->
    <link rel="apple-touch-startup-image" href="/splash-750x1334.png"
          media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />

    <title>Halo · AI Market Intelligence</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --halo-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Inter', system-ui, 'Helvetica Neue', Helvetica, Arial, sans-serif;
        --halo-mono: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Monaco, 'Cascadia Mono', Consolas, monospace;
      }
      html, body {
        background: #faf8f3; color: #2a2e42;
        font-family: var(--halo-sans);
        font-feature-settings: "tnum" 1, "cv11" 1, "ss01" 1, "calt" 1;
        font-variant-numeric: tabular-nums;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        width: 100%;
        overflow-x: hidden;
        /* Lock the viewport to vertical scrolling only. pan-y blocks horizontal
           panning (so users can't drag the page sideways) while still allowing
           native vertical scroll, and — combined with the viewport meta — also
           blocks pinch-zoom in standalone PWA mode. */
        touch-action: pan-y;
        overscroll-behavior: contain;
      }
      @media (prefers-color-scheme: dark) {
        html, body { background: #0a0b10; color: #dcd9d0; }
      }
      /* Disable text selection on UI chrome (kept on content for copy/paste) */
      button { -webkit-user-select: none; user-select: none; font-family: inherit; font-feature-settings: inherit; }
      #root { min-height: 100vh; overflow-x: hidden; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
