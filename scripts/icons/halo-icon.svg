<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="68%">
      <stop offset="0%"   stop-color="#fffaf2"/>
      <stop offset="60%"  stop-color="#fcf2dd"/>
      <stop offset="100%" stop-color="#f0dfb6"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="40%" stop-color="#f0c585" stop-opacity="0"/>
      <stop offset="72%" stop-color="#e6b46a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#e6b46a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="innerLight" cx="50%" cy="48%" r="50%">
      <stop offset="0%"   stop-color="#fffaee" stop-opacity="0.95"/>
      <stop offset="55%"  stop-color="#fae6c2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f5d9b3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringBody" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#fae0bf"/>
      <stop offset="22%"  stop-color="#dfb07e"/>
      <stop offset="55%"  stop-color="#b88451"/>
      <stop offset="100%" stop-color="#774a22"/>
    </linearGradient>
    <linearGradient id="ringSheenTop" x1="50%" y1="0%" x2="50%" y2="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ringShadeBottom" x1="50%" y1="50%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3d2410" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- Cream background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Soft outer glow ring (golden aureole around the halo) -->
  <circle cx="512" cy="512" r="430" fill="url(#outerGlow)"/>

  <!-- Inner ambient luminance — gives the halo its "lit-from-within" feel
       without putting an explicit dot at the center -->
  <circle cx="512" cy="512" r="240" fill="url(#innerLight)"/>

  <!-- Halo ring body (gold gradient, top-bright → bottom-deep for 3D feel) -->
  <circle cx="512" cy="512" r="296" fill="none" stroke="url(#ringBody)" stroke-width="56"/>

  <!-- Specular sheen on the top half of the ring -->
  <circle cx="512" cy="512" r="296" fill="none" stroke="url(#ringSheenTop)" stroke-width="22"/>

  <!-- Soft shadow on the bottom half (subtle dimensionality) -->
  <circle cx="512" cy="512" r="296" fill="none" stroke="url(#ringShadeBottom)" stroke-width="56" opacity="0.55"/>

  <!-- Crisp inner edge highlight (catches light around the inside rim) -->
  <circle cx="512" cy="512" r="270" fill="none" stroke="#fff5e0" stroke-width="2" opacity="0.55"/>
</svg>
